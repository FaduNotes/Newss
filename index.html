<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat App</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111b21">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#0b141a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}
.header{
background:#1f2c33;
padding:12px;
display:flex;
align-items:center;
justify-content:space-between;
}
.profile{
display:flex;
align-items:center;
gap:10px;
}
.dp{
width:42px;
height:42px;
border-radius:50%;
background:#00a884;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}
.chat-box{
flex:1;
overflow-y:auto;
padding:10px;
background:#0b141a;
}
.msg{
max-width:75%;
padding:8px 10px;
border-radius:10px;
margin:5px 0;
position:relative;
word-wrap:break-word;
}
.sent{
background:#005c4b;
margin-left:auto;
}
.received{
background:#202c33;
}
.time{
font-size:10px;
opacity:.7;
text-align:right;
margin-top:4px;
}
.input-area{
display:flex;
padding:10px;
background:#1f2c33;
gap:8px;
}
.input-area textarea{
flex:1;
resize:none;
border:none;
outline:none;
background:#2a3942;
color:white;
padding:10px;
border-radius:8px;
height:45px;
}
.send-btn{
background:#00a884;
border:none;
width:50px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}
.login{
position:fixed;
inset:0;
background:#111b21;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}
.login-box{
background:#1f2c33;
padding:25px;
border-radius:10px;
width:90%;
max-width:320px;
text-align:center;
}
.login-box input{
width:100%;
padding:12px;
margin-top:10px;
background:#2a3942;
border:none;
color:white;
border-radius:6px;
}
.login-box button{
width:100%;
padding:12px;
margin-top:12px;
background:#00a884;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}
.reply-box{
background:#202c33;
padding:6px;
display:none;
}
.typing{
font-size:12px;
color:#00a884;
padding-left:15px;
padding-top:4px;
}
img.chat-img{
width:100%;
border-radius:8px;
margin-top:5px;
}
</style>
</head>
<body>

<div class="login" id="loginScreen">
<div class="login-box">
<h2>🔒 Private Chat</h2>
<input type="password" id="pass" placeholder="Password">
<input type="text" id="name" placeholder="Your Name">
<button onclick="login()">Enter Chat</button>
</div>
</div>

<div class="header">
<div class="profile">
<div class="dp">❤️</div>
<div>
<h3>Private Couple Chat</h3>
<div id="status">online</div>
</div>
</div>
<div>
<button onclick="clearChat()">🗑️</button>
</div>
</div>

<div class="typing" id="typing"></div>

<div class="chat-box" id="chatBox"></div>

<div class="reply-box" id="replyBox"></div>

<div class="input-area">
<input type="file" id="imgInput" accept="image/*" hidden>
<button onclick="document.getElementById('imgInput').click()">📎</button>
<textarea id="msg"></textarea>
<button class="send-btn" onclick="sendMsg()">➤</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {
getDatabase,
ref,
push,
onValue,
remove,
set,
onDisconnect
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
apiKey: 'YOUR_API_KEY',
authDomain: 'YOUR_AUTH_DOMAIN',
databaseURL: 'YOUR_DATABASE_URL',
projectId: 'YOUR_PROJECT_ID',
storageBucket: 'YOUR_STORAGE_BUCKET',
messagingSenderId: 'YOUR_MSG_ID',
appId: 'YOUR_APP_ID'
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser='';
let replyData='';

window.login=function(){
const pass=document.getElementById('pass').value;
const name=document.getElementById('name').value;

if(pass!=='JANU'){
alert('Wrong Password');
return;
}

if(name===''){
alert('Enter Name');
return;
}

currentUser=name;
document.getElementById('loginScreen').style.display='none';

set(ref(db,'online/'+name),true);
onDisconnect(ref(db,'online/'+name)).remove();

loadMsgs();
}

function loadMsgs(){
onValue(ref(db,'messages'),snap=>{
const data=snap.val();
const chat=document.getElementById('chatBox');
chat.innerHTML='';

if(data){
Object.entries(data).forEach(([id,msg])=>{
const div=document.createElement('div');
div.className='msg '+(msg.user===currentUser?'sent':'received');

let imageHTML='';
if(msg.image){
imageHTML=`<img src="${msg.image}" class="chat-img">`;
}

let replyHTML='';
if(msg.reply){
replyHTML=`<div style="font-size:12px;color:#00a884;margin-bottom:4px">Reply: ${msg.reply}</div>`;
}

div.innerHTML=`
${replyHTML}
<div>${msg.text||''}</div>
${imageHTML}
<div class="time">${msg.time}</div>
`;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

if(Notification.permission==='granted' && msg.user!==currentUser){
new Notification(msg.user,{body:msg.text||'Image'});
}

});
}
});
}

window.sendMsg=function(){
const text=document.getElementById('msg').value;
const file=document.getElementById('imgInput').files[0];

if(text===' ' && !file)return;

const msgData={
user:currentUser,
text:text,
time:new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
reply:replyData
};

if(file){
const reader=new FileReader();
reader.onload=function(e){
msgData.image=e.target.result;
push(ref(db,'messages'),msgData);
}
reader.readAsDataURL(file);
}else{
push(ref(db,'messages'),msgData);
}

document.getElementById('msg').value='';
document.getElementById('imgInput').value='';
replyData='';
document.getElementById('replyBox').style.display='none';
}

window.clearChat=function(){
remove(ref(db,'messages'));
}

if('Notification' in window){
Notification.requestPermission();
}

document.getElementById('msg').addEventListener('input',()=>{
set(ref(db,'typing/'+currentUser),true);
setTimeout(()=>{
remove(ref(db,'typing/'+currentUser));
},1000);
});

onValue(ref(db,'typing'),snap=>{
const data=snap.val();
const typing=document.getElementById('typing');

if(data){
const users=Object.keys(data).filter(u=>u!==currentUser);
if(users.length>0){
typing.innerText=users[0]+' typing...';
}else{
typing.innerText='';
}
}else{
typing.innerText='';
}
});

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>
</body>
  </html>
